<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GAME ON — Download Your Photo</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#080808; color:#fff;
      font-family:'Montserrat', Arial, sans-serif;
      min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:20px; text-align:center;
    }
    .logo { font-size:18px; letter-spacing:6px; text-transform:uppercase; color:#fff; margin-bottom:4px; }
    .logo span { color:#F6020C; }
    .divider { width:60px; height:1px; background:linear-gradient(90deg, transparent, #F6020C, transparent); margin:12px auto 24px; }
    #photo { max-width:100%; max-height:60vh; border-radius:2px; box-shadow:0 0 40px rgba(201,168,76,0.2); display:none; }
    .btn {
      display:inline-block; margin-top:20px;
      padding:14px 36px;
      background:#F6020C; color:#000;
      font-size:11px; font-weight:600;
      letter-spacing:3px; text-transform:uppercase;
      border-radius:2px; text-decoration:none;
      cursor:pointer; border:none; font-family:'Montserrat',sans-serif;
    }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .tagline { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-top:24px; }
    .error { color:#ff6b6b; font-size:12px; letter-spacing:2px; }
    #loading { font-size:11px; letter-spacing:3px; color:#F6020C; text-transform:uppercase; }
    #status { font-size:11px; color:rgba(255,255,255,0.4); margin-top:12px; letter-spacing:1px; min-height:18px; }
  </style>
</head>
<body>
  <img src="logo.png" alt="GAME ON" style="height:70px;width:auto;object-fit:contain;margin-bottom:8px;" />
  <div class="divider"></div>

  <div id="loading">Loading your photo...</div>
  <img id="photo" alt="Your GAME ON photo"/>
  <div id="error" class="error" style="display:none;"></div>
  <button class="btn" id="download-btn" style="display:none;" onclick="downloadPhoto()">⬇ Download Photo</button>
  <div id="status"></div>
  <p class="tagline">Powered by GAME ON</p>

  <script>
    const params = new URLSearchParams(window.location.search);

    // Support both ?url=... (direct fal URL) and legacy ?k=... (local storage key)
    let photoUrl = null;

    const directUrl = params.get('url');
    const legacyKey = params.get('k');

    if (directUrl) {
      photoUrl = decodeURIComponent(directUrl);
    } else if (legacyKey) {
      // Legacy fallback for old QR codes
      photoUrl = sessionStorage.getItem(legacyKey) || localStorage.getItem(legacyKey);
    }

    const img = document.getElementById('photo');
    const loading = document.getElementById('loading');
    const btn = document.getElementById('download-btn');
    const error = document.getElementById('error');
    const status = document.getElementById('status');

    if (photoUrl) {
      img.onload = () => {
        loading.style.display = 'none';
        img.style.display = 'block';
        btn.style.display = 'inline-block';
      };
      img.onerror = () => {
        // Image may not preview due to CORS but can still download
        loading.style.display = 'none';
        btn.style.display = 'inline-block';
        status.textContent = 'Tap below to download your photo';
      };
      img.src = photoUrl;
    } else {
      loading.style.display = 'none';
      error.style.display = 'block';
      error.textContent = 'Photo not found. Please scan the QR code again at the kiosk.';
    }

    async function downloadPhoto() {
      if (!photoUrl) return;

      btn.disabled = true;
      btn.textContent = 'Downloading...';
      status.textContent = 'Fetching full quality image...';

      try {
        const response = await fetch(photoUrl);
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const blob = await response.blob();
        const sizeMB = (blob.size / 1024 / 1024).toFixed(1);
        const ext = blob.type.includes('png') ? 'png' : 'jpg';
        const filename = 'om-events-photo.' + ext;

        // Create blob URL and trigger download
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);

        status.textContent = '✓ Saved — ' + sizeMB + ' MB ' + ext.toUpperCase();
        btn.disabled = false;
        btn.textContent = '✓ Downloaded';
        setTimeout(() => { btn.textContent = '⬇ Download Photo'; }, 4000);

      } catch (err) {
        // Blob download failed (common on iOS) — open directly
        status.textContent = 'Tap and hold the photo to save it';
        btn.disabled = false;
        btn.textContent = '⬇ Download Photo';
        window.open(photoUrl, '_blank');
      }
    }
  </script>
</body>
</html>
