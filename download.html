<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OM Events — Download Your Photo</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#080808; color:#fff;
      font-family:'Montserrat', Arial, sans-serif;
      min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:20px; text-align:center;
    }
    .logo { font-size:18px; letter-spacing:6px; text-transform:uppercase; color:#fff; margin-bottom:4px; }
    .logo span { color:#C9A84C; }
    .divider { width:60px; height:1px; background:linear-gradient(90deg, transparent, #C9A84C, transparent); margin:12px auto 24px; }
    #photo { max-width:100%; max-height:65vh; border-radius:2px; box-shadow:0 0 40px rgba(201,168,76,0.2); display:none; }
    .btn {
      display:inline-block; margin-top:20px;
      padding:14px 40px;
      background:#C9A84C; color:#000;
      font-size:11px; font-weight:600;
      letter-spacing:4px; text-transform:uppercase;
      border-radius:2px; text-decoration:none;
      cursor:pointer; border:none;
    }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-outline {
      display:inline-block; margin-top:12px; margin-left:12px;
      padding:14px 28px;
      background:transparent; color:#C9A84C;
      font-size:11px; font-weight:600;
      letter-spacing:3px; text-transform:uppercase;
      border-radius:2px; text-decoration:none;
      cursor:pointer; border:1px solid #C9A84C;
    }
    .tagline { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-top:24px; }
    .error { color:#ff6b6b; font-size:12px; letter-spacing:2px; }
    #loading { font-size:12px; letter-spacing:3px; color:#C9A84C; text-transform:uppercase; }
    #status { font-size:11px; color:rgba(255,255,255,0.5); margin-top:10px; letter-spacing:1px; min-height:16px; }
    .btn-row { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:8px; }
  </style>
</head>
<body>
  <div class="logo">OM <span>Events</span></div>
  <div class="divider"></div>

  <div id="loading">Loading your photo...</div>
  <img id="photo" alt="Your OM Events photo"/>
  <div id="error" class="error" style="display:none;">Photo not found or expired.</div>

  <div class="btn-row" id="btn-row" style="display:none;">
    <button class="btn" id="download-btn" onclick="downloadPhoto()">⬇ Download Photo</button>
    <a class="btn-outline" id="open-btn" target="_blank">↗ Open Full Size</a>
  </div>

  <div id="status"></div>
  <p class="tagline">Powered by OM Events</p>

  <script>
    let photoUrl = null;

    // Get URL from params
    const params = new URLSearchParams(window.location.search);
    const key = params.get('k');
    const directUrl = params.get('url');

    if (directUrl) {
      photoUrl = decodeURIComponent(directUrl);
    } else if (key) {
      photoUrl = sessionStorage.getItem(key) || localStorage.getItem(key);
    }

    if (photoUrl) {
      const img = document.getElementById('photo');
      const loading = document.getElementById('loading');
      const btnRow = document.getElementById('btn-row');
      const openBtn = document.getElementById('open-btn');

      img.onload = () => {
        loading.style.display = 'none';
        img.style.display = 'block';
        btnRow.style.display = 'flex';
        openBtn.href = photoUrl;
      };

      img.onerror = () => {
        loading.style.display = 'none';
        btnRow.style.display = 'flex';
        openBtn.href = photoUrl;
        document.getElementById('status').textContent = 'Preview unavailable — use Open Full Size';
      };

      img.src = photoUrl;
    } else {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }

    // Download as PNG blob — forces correct format and large file size
    async function downloadPhoto() {
      if (!photoUrl) return;

      const btn = document.getElementById('download-btn');
      const status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = 'Preparing...';
      status.textContent = 'Fetching full quality image...';

      try {
        // Fetch the image as a blob
        const response = await fetch(photoUrl);
        if (!response.ok) throw new Error('Fetch failed: ' + response.status);

        const blob = await response.blob();

        // Determine extension from actual content type
        const contentType = blob.type || 'image/png';
        const ext = contentType.includes('png') ? 'png' : 'jpg';
        const filename = 'om-events-photo.' + ext;
        const sizeMB = (blob.size / 1024 / 1024).toFixed(1);

        status.textContent = `File size: ${sizeMB} MB — saving as ${ext.toUpperCase()}`;

        // Create object URL and trigger download
        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = objectUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Clean up
        setTimeout(() => URL.revokeObjectURL(objectUrl), 5000);

        btn.disabled = false;
        btn.textContent = '✓ Downloaded';
        setTimeout(() => { btn.textContent = '⬇ Download Photo'; }, 3000);

      } catch (err) {
        console.error('Download failed:', err);
        status.textContent = 'Direct download failed — use Open Full Size button';
        btn.disabled = false;
        btn.textContent = '⬇ Download Photo';

        // Fallback — open in new tab so user can long-press save
        window.open(photoUrl, '_blank');
      }
    }
  </script>
</body>
</html>
